commands:
  install: cd synaptic-pruning && pip install -e .
  test: cd synaptic-pruning && pytest tests/ -v
  lint: cd synaptic-pruning && flake8 synaptic_pruning/ tests/ --max-line-length=100
  typecheck: cd synaptic-pruning && mypy synaptic_pruning/ --ignore-missing-imports
  benchmark-gpt2: cd synaptic-pruning && python benchmarks/train_gpt2_small.py
  benchmark-perplexity: cd synaptic-pruning && python benchmarks/evaluate_perplexity.py
  benchmark-ablation: cd synaptic-pruning && python benchmarks/ablation_pruning.py
  example: cd synaptic-pruning && python examples/end_to_end_pipeline.py

services: {}
